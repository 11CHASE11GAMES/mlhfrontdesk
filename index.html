<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MLH Front Desk Display</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="display-shell" aria-labelledby="page-title">
      <header class="top-bar">
        <div>
          <p class="eyebrow">Front Desk Display</p>
          <h1 id="page-title">MLH</h1>
        </div>
        <p class="status-pill" aria-label="Current display mode">Home</p>
      </header>

      <section class="wheel-stage" aria-label="Display options">
        <div
          class="wheel-copy"
          aria-live="polite"
          data-default-title="Choose a Page"
          data-default-description="Hover a slice to preview each front desk screen."
        >
          <p class="eyebrow">Select Display</p>
          <h2 id="selected-title">Choose a Page</h2>
          <p id="selected-description">
            Hover a slice to preview each front desk screen.
          </p>
        </div>

        <nav class="radial-menu" aria-label="MLH display pages">
          <svg
            class="wheel"
            viewBox="-230 -230 460 460"
            role="img"
            aria-labelledby="wheel-title wheel-description"
          >
            <title id="wheel-title">MLH display navigation wheel</title>
            <desc id="wheel-description">
              A circular menu with selectable slices for front desk display pages.
            </desc>

            <a
              class="wheel-link"
              href="packages.html"
              aria-label="Open packages display"
              data-window-name="mlh-packages-display"
              data-title="Packages"
              data-description="Open the package tracker for residents picking up mail."
            >
              <g class="wheel-slice-group">
                <path class="wheel-slice" d="M 0 0 L 0 -200 A 200 200 0 0 1 173.205 -100 Z" />
                <text class="wheel-label" x="86" y="-112">Packages</text>
              </g>
            </a>

            <a
              class="wheel-link"
              href="announcements.html"
              aria-label="Open announcements display"
              data-title="Announcements"
              data-description="Show current hall updates, reminders, and desk notices."
            >
              <g class="wheel-slice-group">
                <path class="wheel-slice" d="M 0 0 L 173.205 -100 A 200 200 0 0 1 173.205 100 Z" />
                <text class="wheel-label wheel-label-wide" x="134" y="5">Announcements</text>
              </g>
            </a>

            <a
              class="wheel-link"
              href="weather.html"
              aria-label="Open weather display"
              data-title="Weather"
              data-description="Display local conditions and the forecast for residents."
            >
              <g class="wheel-slice-group">
                <path class="wheel-slice" d="M 0 0 L 173.205 100 A 200 200 0 0 1 0 200 Z" />
                <text class="wheel-label" x="78" y="122">Weather</text>
              </g>
            </a>

            <a
              class="wheel-link"
              href="events.html"
              aria-label="Open events display"
              data-title="Events"
              data-description="Highlight upcoming programs, meetings, and hall activities."
            >
              <g class="wheel-slice-group">
                <path class="wheel-slice" d="M 0 0 L 0 200 A 200 200 0 0 1 -173.205 100 Z" />
                <text class="wheel-label" x="-78" y="122">Events</text>
              </g>
            </a>

            <a
              class="wheel-link"
              href="resources.html"
              aria-label="Open resources display"
              data-title="Resources"
              data-description="Share useful desk links, forms, and resident services."
            >
              <g class="wheel-slice-group">
                <path class="wheel-slice" d="M 0 0 L -173.205 100 A 200 200 0 0 1 -173.205 -100 Z" />
                <text class="wheel-label wheel-label-wide" x="-134" y="5">Resources</text>
              </g>
            </a>

            <a
              class="wheel-link"
              href="settings.html"
              aria-label="Open display settings"
              data-title="Settings"
              data-description="Adjust display behavior and future front desk controls."
            >
              <g class="wheel-slice-group">
                <path class="wheel-slice" d="M 0 0 L -173.205 -100 A 200 200 0 0 1 0 -200 Z" />
                <text class="wheel-label" x="-86" y="-112">Settings</text>
              </g>
            </a>

            <circle class="wheel-center" r="60" />
            <text class="wheel-center-title" x="0" y="-6">MLH</text>
            <text class="wheel-center-subtitle" x="0" y="24">Display</text>
          </svg>
        </nav>
      </section>
    </main>

    <script src="main.js"></script>
  </body>
</html>
