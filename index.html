<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MSOE Dorm Front Desk Display</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="display-shell" aria-labelledby="page-title">
      <header class="top-bar">
        <div>
          <p class="eyebrow">Front Desk Display</p>
          <h1 id="page-title">MSOE Dorm</h1>
        </div>
        <p class="status-pill" aria-label="Current display mode">Home</p>
      </header>

      <section class="wheel-stage" aria-label="Display options">
        <div
          class="wheel-copy"
          aria-live="polite"
          data-default-title="Choose a Page"
          data-default-description="Hover a slice to preview each front desk screen."
        >
          <p class="eyebrow">Select Display</p>
          <h2 id="selected-title">Choose a Page</h2>
          <p id="selected-description">
            Hover a slice to preview each front desk screen.
          </p>
        </div>

        <nav class="radial-menu" aria-label="MSOE Dorm display pages">
          <svg
            class="wheel"
            viewBox="-230 -230 460 460"
            role="img"
            aria-labelledby="wheel-title wheel-description"
          >
            <title id="wheel-title">MSOE Dorm display navigation wheel</title>
            <desc id="wheel-description">
              A circular menu with selectable slices for front desk display pages.
            </desc>

            <a
              class="wheel-link"
              href="packages.html"
              aria-label="Open packages display"
              data-window-name="mlh-packages-display"
              data-title="Packages"
              data-description="Open the package tracker for residents picking up mail."
            >
              <g class="wheel-slice-group">
                <path
                  class="wheel-slice"
                  d="M 0 0 L -141.421 -141.421 A 200 200 0 0 1 141.421 -141.421 Z"
                />
                <text class="wheel-label" x="0" y="-144">Packages</text>
              </g>
            </a>

            <a
              class="wheel-link"
              href="announcements.html"
              aria-label="Open announcements display"
              data-window-name="mlh-announcements-display"
              data-title="Announcements"
              data-description="Show the looping announcements slides on the front desk display."
            >
              <g class="wheel-slice-group">
                <path
                  class="wheel-slice"
                  d="M 0 0 L 141.421 -141.421 A 200 200 0 0 1 141.421 141.421 Z"
                />
                <text class="wheel-label wheel-label-wide" x="136" y="5">Announcements</text>
              </g>
            </a>

            <a
              class="wheel-link"
              href="events.html"
              aria-label="Open events display"
              data-window-name="mlh-events-display"
              data-title="Events"
              data-description="Show the looping events slides on the front desk display."
            >
              <g class="wheel-slice-group">
                <path
                  class="wheel-slice"
                  d="M 0 0 L 141.421 141.421 A 200 200 0 0 1 -141.421 141.421 Z"
                />
                <text class="wheel-label" x="0" y="150">Events</text>
              </g>
            </a>

            <a
              class="wheel-link"
              href="settings.html"
              aria-label="Open display settings"
              data-title="Settings"
              data-description="Adjust display behavior and future front desk controls."
            >
              <g class="wheel-slice-group">
                <path
                  class="wheel-slice"
                  d="M 0 0 L -141.421 141.421 A 200 200 0 0 1 -141.421 -141.421 Z"
                />
                <text class="wheel-label" x="-134" y="5">Settings</text>
              </g>
            </a>

            <circle class="wheel-center" r="60" />
            <text class="wheel-center-title" x="0" y="-6">MSOE</text>
            <text class="wheel-center-subtitle" x="0" y="24">Dorm</text>
          </svg>
        </nav>
      </section>
    </main>

    <script src="display-config.js"></script>
    <script src="theme.js"></script>
    <script src="main.js"></script>
  </body>
</html>
