<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MSOE Dorm Front Desk Display</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body data-page-title-suffix="Front Desk Display" data-rotation-page="home">
    <main class="display-shell" aria-labelledby="page-title">
      <header class="top-bar">
        <div>
          <p class="eyebrow">Front Desk Display</p>
          <h1 id="page-title" data-dorm-name>MSOE Dorm</h1>
        </div>
        <p class="status-pill" aria-label="Current display mode">Home</p>
      </header>

      <section class="wheel-stage" aria-label="Display options">
        <div
          class="wheel-copy"
          aria-live="polite"
          data-default-title="Choose a Page"
          data-default-description="Hover over a slice to see what it does."
        >
          <p class="eyebrow">Select Display</p>
          <h2 id="selected-title">Choose a Page</h2>
          <p id="selected-description">
            Hover over a slice to see what it does.
          </p>
        </div>

        <nav class="radial-menu" data-dorm-nav-label aria-label="MSOE Dorm display pages">
          <svg
            class="wheel"
            viewBox="-230 -230 460 460"
            role="img"
            aria-labelledby="wheel-title wheel-description"
          >
            <title id="wheel-title">MSOE Dorm display navigation wheel</title>
            <desc id="wheel-description">
              A circular menu with selectable slices for front desk display pages.
            </desc>

            <a
              class="wheel-link"
              href="display.html"
              aria-label="Open packages display"
              data-display-key="packages"
              data-title="Packages"
              data-description="Open the package tracker."
            >
              <g class="wheel-slice-group">
                <path
                  class="wheel-slice"
                  d="M 0 0 L -141.421 -141.421 A 200 200 0 0 1 141.421 -141.421 Z"
                />
                <text class="wheel-label" x="0" y="-144">Packages</text>
              </g>
            </a>

            <a
              class="wheel-link"
              href="display.html"
              aria-label="Open announcements display"
              data-display-key="announcements"
              data-title="Announcements"
              data-description="Show the looping announcements slides."
            >
              <g class="wheel-slice-group">
                <path
                  class="wheel-slice"
                  d="M 0 0 L 141.421 -141.421 A 200 200 0 0 1 141.421 141.421 Z"
                />
                <text class="wheel-label wheel-label-wide" x="136" y="5">Announcements</text>
              </g>
            </a>

            <a
              class="wheel-link"
              href="display.html"
              aria-label="Open events display"
              data-display-key="events"
              data-title="Events"
              data-description="Show the looping events slides."
            >
              <g class="wheel-slice-group">
                <path
                  class="wheel-slice"
                  d="M 0 0 L 141.421 141.421 A 200 200 0 0 1 -141.421 141.421 Z"
                />
                <text class="wheel-label" x="0" y="150">Events</text>
              </g>
            </a>

            <a
              class="wheel-link"
              href="settings.html"
              aria-label="Open display settings"
              data-display-key="settings"
              data-title="Settings"
              data-description="Adjust display behavior and other front desk controls."
            >
              <g class="wheel-slice-group">
                <path
                  class="wheel-slice"
                  d="M 0 0 L -141.421 141.421 A 200 200 0 0 1 -141.421 -141.421 Z"
                />
                <text class="wheel-label" x="-134" y="5">Settings</text>
              </g>
            </a>

            <circle class="wheel-center" r="60" />
          </svg>

          <div class="wheel-center-control">
            <p class="wheel-center-control-label">Auto-Rotate</p>

            <button
              id="auto-rotation-button"
              class="wheel-center-button"
              type="button"
            >
              Start Rotation
            </button>

            <p
              id="auto-rotation-status"
              class="wheel-center-control-status"
              role="status"
              aria-live="polite"
            >
              Off
            </p>
          </div>
        </nav>
      </section>

      <footer class="page-footer">&copy; 2026 Chase McNulty. All Rights Reserved.</footer>
    </main>

    <script src="display-config.js"></script>
    <script src="rotation.js"></script>
    <script src="branding.js"></script>
    <script src="theme.js"></script>
    <script src="status-widget.js"></script>
    <script src="main.js"></script>
  </body>
</html>
